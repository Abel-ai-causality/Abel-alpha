interface:
  display_name: "Abel Alpha"
  short_description: "Bootstrap-first, reuse-first causal workspace research skill."
  default_prompt: >
    Use $abel-alpha to establish or continue the default Abel workspace for
    the current launch root. On first use, prefer the thin
    `scripts/bootstrap_workspace.py --path ...` entrypoint so system Python is
    enough to establish the workspace; after the workspace exists, continue
    from inside it with the Abel-alpha CLI, and when re-entering from the
    launch root, reuse that same child workspace before creating anything
    new; keep explicit paths, auth reuse-first behavior, and Abel causal
    discovery as the opening prior for narrower, compounding exploration.
