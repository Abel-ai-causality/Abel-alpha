interface:
  display_name: "Abel Alpha"
  short_description: "Reuse-first Abel workspace research skill."
  default_prompt: >
    Use $abel-alpha to detect, reuse, or create the default Abel workspace for
    the current launch root, always use an explicit workspace path when
    creating, prepare the workspace runtime, reuse existing auth before
    starting a new login, and continue the session, branch, and round workflow
    with the Abel-alpha CLI tools.
